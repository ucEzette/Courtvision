name: Build Windows App

on:
  workflow_dispatch: # Allows you to manually click "Run Workflow" in GitHub
  push:
    tags:
      - 'v*' # Auto-triggers if you push a tag like v1.0.0

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        run: npm install

      - name: Fetch and Inject FFmpeg Native Sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o win.zip https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffmpeg-6.1-win-64.zip
          unzip -o win.zip
          mv ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          rm win.zip ffprobe.exe

      - name: Build Tauri Windows Installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Save Installer as Artifact Fallback
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
