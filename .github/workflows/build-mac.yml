name: Build MacOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    permissions:
      contents: write
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Install Frontend Dependencies
        run: npm install

      - name: Fetch and Inject FFmpeg Native Sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o mac.zip https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffmpeg-6.1-macos-64.zip
          unzip -o mac.zip
          mv ffmpeg src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          cp src-tauri/binaries/ffmpeg-x86_64-apple-darwin src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          rm mac.zip ffprobe

      - name: Build Tauri Mac Installer (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Build Tauri Mac Installer (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-apple-darwin

      - name: Save Installers as Artifact Fallback
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Installers
          path: src-tauri/target/*/release/bundle/dmg/*.dmg
